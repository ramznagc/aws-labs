AWSTemplateFormatVersion: "2010-09-09"

Description: >
  My first AWS CloudFormation template.
  This template creates an EC2 instance and a Security Group
  that allows SSH and HTTP traffic.

Resources:

  MyCfnSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  MyCfnInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-xxxxxxxxxxxxxxxxx
      InstanceType: t2.micro
      KeyName: YOUR-KEY-PAIR-NAME

      SecurityGroups:
        - !Ref MyCfnSG

      Tags:
        - Key: Name
          Value: MyCloudFormationInstance