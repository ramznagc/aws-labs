AWSTemplateFormatVersion: "2010-09-09"

Description: >
  My first AWS CloudFormation template.
  This template creates an EC2 instance and a Security Group
  that allows SSH and HTTP traffic.

Parameters:

  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Select an existing EC2 Key Pair

Resources:

  MyCfnSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  MyCfnInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-xxxxxxxxxxxxxxxxx
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName

      SecurityGroups:
        - !Ref MyCfnSG

      Tags:
        - Key: Name
          Value: MyCloudFormationInstance